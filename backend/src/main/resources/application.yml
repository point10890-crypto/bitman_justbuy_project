server:
  port: 8080

spring:
  application:
    name: justbuy-api
  datasource:
    url: jdbc:h2:file:./data/justbuy-db;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

bitman:
  ai:
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    openai-api-key: ${OPENAI_API_KEY:}
    google-api-key: ${GOOGLE_API_KEY:}
    perplexity-api-key: ${PERPLEXITY_API_KEY:}
    grok-api-key: ${XAI_API_KEY:}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://localhost:5173,https://bitman-justbuy.pages.dev}
  storage:
    data-dir: ${STORAGE_DIR:./data}
  scheduler:
    enabled: ${SCHEDULER_ENABLED:false}
  jwt:
    secret: ${JWT_SECRET:bitman-justbuy-default-jwt-secret-key-change-in-production-at-least-32-bytes}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  admin:
    email: ${ADMIN_EMAIL:point10890@gmail.com}
