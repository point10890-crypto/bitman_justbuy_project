<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161B22"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFC107"/>
      <stop offset="100%" style="stop-color:#FF9800"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C853"/>
      <stop offset="100%" style="stop-color:#00E676"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Gold border -->
  <rect x="4" y="4" width="504" height="504" rx="92" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.6"/>
  <!-- B letter -->
  <text x="256" y="300" text-anchor="middle" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="260" fill="url(#gold)">B</text>
  <!-- Live dot -->
  <circle cx="400" cy="120" r="24" fill="url(#green)"/>
  <circle cx="400" cy="120" r="12" fill="#0D1117"/>
  <circle cx="400" cy="120" r="8" fill="url(#green)"/>
  <!-- Chart line -->
  <polyline points="80,420 160,380 240,400 320,340 400,360 430,310" fill="none" stroke="url(#green)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
</svg>
